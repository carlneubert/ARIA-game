<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIAdle — Learn ARIA Attributes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --surface2: #1e1e2d;
    --border: #2a2a3d;
    --accent: #8371fe;       /* was #7c6af7 — lifted to 4.5:1 on surface2 */
    --accent-btn: #5b47f5;   /* darker accent for white button text (5.73:1) */
    --accent2: #c4447e;      /* was #f76aub — darkened to 4.69:1 for white text */
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #a0a0a8;        /* was #6b6b8a — lifted to 6.33:1 on surface2, 7.46:1 on bg */
    --code-bg: #0a0a10;
  }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: var(--text);
font-family: 'DM Sans', sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
}

/* Subtle grid background */
body::before {
content: '';
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
}

header {
width: 100%;
max-width: 680px;
padding: 24px 20px 0;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
font-family: 'Space Mono', monospace;
font-size: 22px;
font-weight: 700;
letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.logo em { color: var(--accent2); font-style: normal; }

.streak-badge {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 20px;
padding: 6px 14px;
font-size: 13px;
font-family: 'Space Mono', monospace;
color: var(--muted);
}
.streak-badge strong { color: var(--yellow); }

main {
width: 100%;
max-width: 640px;
padding: 24px 28px 56px;
display: flex;
flex-direction: column;
gap: 0;
}

/* ── Top chrome: progress + meta ── */
.top-chrome {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 32px;
}

.progress-track {
flex: 1;
background: var(--surface2);
border-radius: 4px;
height: 4px;
overflow: hidden;
}
.progress-fill {
height: 100%;
border-radius: 4px;
background: linear-gradient(90deg, var(--accent), var(--accent2));
transition: width 0.5s ease;
}

.question-meta {
display: flex;
align-items: center;
gap: 8px;
font-size: 12px;
color: var(--muted);
font-family: 'Space Mono', monospace;
white-space: nowrap;
}

/* ── TIER 1: The Question — hero element ── */
.question-hero {
margin-bottom: 28px;
}

.question-eyebrow {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 14px;
}

.question-number {
font-family: 'Space Mono', monospace;
font-size: 11px;
color: var(--muted);
letter-spacing: 1px;
text-transform: uppercase;
}

.question-text {
font-size: 24px;
font-weight: 700;
line-height: 1.4;
color: var(--text);
letter-spacing: -0.3px;
}

/* ── TIER 2: Code evidence — supporting, compact ── */
.evidence-section {
margin-bottom: 28px;
}

.evidence-label {
font-size: 11px;
font-family: 'Space Mono', monospace;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 6px;
}

.evidence-label::before {
content: '';
display: block;
width: 3px;
height: 10px;
background: var(--accent);
border-radius: 2px;
}

.scenario-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 10px;
overflow: hidden;
}

.scenario-header {
padding: 8px 14px;
background: var(--surface2);
border-bottom: 1px solid var(--border);
display: flex;
align-items: center;
gap: 6px;
}

.scenario-header .dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-r { background: #f87171; }
.dot-y { background: #facc15; }
.dot-g { background: #4ade80; }

.scenario-label {
margin-left: 2px;
font-size: 10px;
color: var(--muted);
font-family: 'Space Mono', monospace;
letter-spacing: 1px;
text-transform: uppercase;
}

.code-block {
padding: 20px;
background: var(--code-bg);
font-family: 'Space Mono', monospace;
font-size: 13px;
line-height: 1.8;
overflow-x: auto;
white-space: pre-wrap;
word-break: break-word;
}

.code-blank {
display: inline-block;
background: rgba(131,113,254,0.15);
border: 2px dashed var(--accent);
border-radius: 4px;
padding: 0 10px;
color: var(--accent);
min-width: 60px;
text-align: center;
animation: pulse-border 2s ease-in-out infinite;
font-weight: 700;
}

@keyframes pulse-border {
0%, 100% { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(131,113,254,0); }
50% { border-color: var(--accent2); box-shadow: 0 0 8px rgba(131,113,254,0.3); }
}

/* Context — collapsed by default, subtle */
.context-toggle {
margin-top: 8px;
display: flex;
align-items: flex-start;
gap: 6px;
font-size: 12px;
color: var(--muted);
line-height: 1.5;
cursor: default;
}
.context-toggle summary {
cursor: pointer;
font-size: 11px;
font-family: 'Space Mono', monospace;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 0.8px;
list-style: none;
display: flex;
align-items: center;
gap: 5px;
padding: 4px 0;
}
.context-toggle summary::-webkit-details-marker { display: none; }
.context-toggle summary::before {
content: '▸';
font-size: 10px;
transition: transform 0.2s;
}
.context-toggle[open] summary::before { transform: rotate(90deg); }
.context-toggle summary:focus-visible {
outline: 2px solid var(--yellow);
outline-offset: 2px;
border-radius: 2px;
}
.context-body {
padding: 8px 0 0 16px;
font-size: 13px;
color: #c0c0d8;
line-height: 1.6;
}

.code-tag { color: #7dd3fc; }
.code-attr { color: #c4b5fd; }
.code-val { color: #86efac; }
.code-comment { color: #6f798d; }

/* ── TIER 3: Answer tiles ── */
.answers-section {
margin-bottom: 16px;
}

.answers-label {
font-size: 11px;
font-family: 'Space Mono', monospace;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 6px;
}
.answers-label::before {
content: '';
display: block;
width: 3px;
height: 10px;
background: var(--accent2);
border-radius: 2px;
}

/* Guesses / answer tiles */
.guess-grid {
display: flex;
flex-direction: column;
gap: 8px;
}

.guess-row {
display: flex;
gap: 8px;
}

.guess-tile {
flex: 1;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 8px;
padding: 13px 16px;
font-family: 'Space Mono', monospace;
font-size: 13px;
cursor: pointer;
transition: all 0.15s ease;
color: var(--text);
text-align: left;
position: relative;
overflow: hidden;
}

.guess-tile:hover:not(:disabled) {
border-color: var(--accent);
background: rgba(124,106,247,0.08);
transform: translateY(-1px);
}

.guess-tile:focus-visible {
outline: 3px solid var(--yellow);
outline-offset: 2px;
}

.guess-tile:disabled { cursor: default; opacity: 0.85; }

.guess-tile.selected {
border-color: var(--accent);
background: rgba(124,106,247,0.15);
color: var(--accent);
}

.guess-tile.correct {
border-color: var(--green);
background: rgba(74,222,128,0.12);
color: var(--green);
animation: flip-in 0.4s ease;
}

.guess-tile.incorrect {
border-color: var(--red);
background: rgba(248,113,113,0.1);
color: var(--red);
animation: shake 0.4s ease;
}

.guess-tile.close {
border-color: var(--yellow);
background: rgba(250,204,21,0.1);
color: var(--yellow);
}

@keyframes flip-in {
0% { transform: rotateX(0); }
50% { transform: rotateX(-90deg); opacity: 0.5; }
100% { transform: rotateX(0); opacity: 1; }
}

@keyframes shake {
0%, 100% { transform: translateX(0); }
20% { transform: translateX(-6px); }
40% { transform: translateX(6px); }
60% { transform: translateX(-4px); }
80% { transform: translateX(4px); }
}

.tile-label {
font-size: 12px;
color: var(--muted);
margin-top: 4px;
font-family: 'DM Sans', sans-serif;
font-weight: 300;
}

/* Hint section */
.hints-area {
display: flex;
flex-direction: column;
gap: 8px;
}

.hint-pill {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 14px;
font-size: 13px;
color: #c0c0d8;
display: flex;
gap: 10px;
align-items: flex-start;
animation: slide-in 0.3s ease;
}

@keyframes slide-in {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}

.hint-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* Feedback overlay */
.feedback-box {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 12px;
padding: 20px;
text-align: center;
animation: slide-in 0.4s ease;
}

.feedback-box.success { border-color: var(--green); }
.feedback-box.fail { border-color: var(--red); }

.feedback-emoji { font-size: 40px; margin-bottom: 10px; }

.feedback-title {
font-family: 'Space Mono', monospace;
font-size: 18px;
font-weight: 700;
margin-bottom: 6px;
}
.feedback-box.success .feedback-title { color: var(--green); }
.feedback-box.fail .feedback-title { color: var(--red); }

.feedback-explanation {
font-size: 14px;
color: #c0c0d8;
line-height: 1.6;
margin-bottom: 16px;
}

.answer-reveal {
font-family: 'Space Mono', monospace;
background: var(--code-bg);
border-radius: 8px;
padding: 10px 16px;
margin-bottom: 16px;
font-size: 13px;
color: var(--green);
border: 1px solid rgba(74,222,128,0.3);
}

.next-btn {
background: linear-gradient(135deg, var(--accent-btn), var(--accent2));
color: white;
border: none;
border-radius: 8px;
padding: 12px 28px;
font-family: 'Space Mono', monospace;
font-size: 14px;
font-weight: 700;
cursor: pointer;
transition: all 0.2s ease;
letter-spacing: 0.5px;
}

.next-btn:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(91,71,245,0.4);
}

.next-btn:focus-visible {
outline: 3px solid var(--yellow);
outline-offset: 3px;
}

/* Score area */
.score-row {
display: flex;
gap: 10px;
}
.score-card {
flex: 1;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 12px;
text-align: center;
}
.score-val {
font-family: 'Space Mono', monospace;
font-size: 24px;
font-weight: 700;
}
.score-lbl {
font-size: 11px;
color: var(--muted);
margin-top: 2px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

/* End screen */
.end-screen {
text-align: center;
padding: 30px 20px;
}
.end-screen h2 {
font-family: 'Space Mono', monospace;
font-size: 26px;
margin-bottom: 10px;
}
.end-screen p {
color: #c0c0d8;
font-size: 15px;
margin-bottom: 24px;
line-height: 1.6;
}

.category-badge {
display: inline-flex;
align-items: center;
font-size: 10px;
font-family: 'Space Mono', monospace;
text-transform: uppercase;
letter-spacing: 1px;
padding: 2px 7px;
border-radius: 4px;
background: rgba(131,113,254,0.12);
color: var(--accent);
border: 1px solid rgba(131,113,254,0.25);
}

.difficulty-pip {
width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 2px;
}

/* Attempts indicator */
.attempts-dots {
display: flex;
gap: 5px;
align-items: center;
}

.attempt-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(--border);
transition: all 0.3s ease;
}
.attempt-dot.used { background: var(--red); }
.attempt-dot.used.correct-dot { background: var(--green); }

.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--yellow);
  color: #000;
  padding: 8px 16px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  border-radius: 0 0 8px 0;
  z-index: 100;
  text-decoration: none;
  transition: top 0.2s;
}
.skip-link:focus { top: 0; }
/* Prevent animation for users who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

</head>
<body>

<a href="#app" class="skip-link">Skip to game</a>

<header role="banner">
  <div class="logo" aria-label="ARIAdle"><span aria-hidden="true">ARIA</span><em aria-hidden="true">dle</em></div>
  <div class="streak-badge" aria-live="polite" aria-label="Current streak">🔥 Streak: <strong id="streak-val">0</strong></div>
</header>

<main id="app" aria-label="ARIAdle game" aria-live="polite" aria-atomic="false"></main>

<script>
const QUESTIONS = [
  {
    id: 1,
    category: "Roles",
    difficulty: 1,
    context: "A navigation landmark is being added to a page. Screen readers need to identify this region so users can jump to it quickly using landmark navigation.",
    codeBefore: `<nav `,
    blank: `role="navigation"`,
    codeAfter: `>\n  <ul>...</ul>\n</nav>`,
    question: "What attribute identifies this as the page navigation landmark for assistive technologies?",
    options: [
      { value: `role="navigation"`, label: "Declares the landmark role", hint: "role= defines what kind of UI component this is" },
      { value: `aria-label="nav"`, label: "Provides an accessible name", hint: "aria-label names an element, but doesn't declare its role" },
      { value: `tabindex="0"`, label: "Makes it keyboard focusable", hint: "tabindex controls focus order, not semantic meaning" },
      { value: `id="main-nav"`, label: "Gives it a unique ID", hint: "id is for referencing elements — not read as a landmark by screen readers" },
    ],
    correctIndex: 0,
    explanation: `The <nav> element already implies landmark semantics in HTML5, but explicitly adding role="navigation" reinforces this. Screen reader users can jump between landmarks using keyboard shortcuts.`,
    hints: [
      "💡 ARIA roles describe what kind of thing an element IS — button, dialog, navigation, etc.",
      "🔍 Landmark roles let screen reader users jump around a page without reading everything.",
    ]
  },
  {
    id: 2,
    category: "States",
    difficulty: 1,
    context: "An accordion component has a button that expands and collapses a content panel. The button's visual state (▸ / ▾) changes on click, but screen readers need to know the state too.",
    codeBefore: `<button \n  `,
    blank: `aria-expanded="false"`,
    codeAfter: `\n  aria-controls="panel-1">\n  Section Title\n</button>`,
    question: "Which attribute tells screen readers whether the controlled panel is currently open or closed?",
    options: [
      { value: `aria-hidden="true"`, label: "Hides the button from AT", hint: "aria-hidden removes the element from the accessibility tree entirely — not what you want here" },
      { value: `aria-expanded="false"`, label: "Announces collapsed state", hint: "aria-expanded communicates open/closed state of a controlled region" },
      { value: `aria-disabled="true"`, label: "Marks it non-interactive", hint: "aria-disabled signals the button can't be activated — unrelated to expand state" },
      { value: `aria-selected="false"`, label: "Marks it unselected", hint: "aria-selected is for tabs and listbox options — not for expand/collapse" },
    ],
    correctIndex: 1,
    explanation: `aria-expanded tells screen readers whether the associated panel is open (true) or closed (false). You must toggle it via JavaScript when the user interacts.`,
    hints: [
      "💡 ARIA states (like aria-expanded) reflect the current condition of an element — they must update dynamically.",
      "🔍 Without aria-expanded, a sighted user sees the arrow change, but a screen reader user hears nothing change.",
    ]
  },
  {
    id: 3,
    category: "Labels",
    difficulty: 1,
    context: "A search input has a visible placeholder but no <label> element. The placeholder disappears on focus, leaving screen reader users without context.",
    codeBefore: `<input \n  type="search"\n  `,
    blank: `aria-label="Search articles"`,
    codeAfter: `\n  placeholder="Search..."\n/>`,
    question: "How do you give this input an accessible name without a visible label element?",
    options: [
      { value: `placeholder="Search articles"`, label: "Uses placeholder as label", hint: "Placeholders vanish on focus and have poor contrast — they fail as accessible names" },
      { value: `title="Search articles"`, label: "Uses tooltip as label", hint: "title is unreliable — not surfaced consistently by screen readers or keyboard-only users" },
      { value: `aria-label="Search articles"`, label: "Directly names the input", hint: "aria-label provides an accessible name when no visible label exists" },
      { value: `name="search"`, label: "Names the form field", hint: "name is for form submission, not accessibility — screen readers ignore it as a label" },
    ],
    correctIndex: 2,
    explanation: `aria-label provides an accessible name directly on the element when no visible label is present or linked. It's announced when the input receives focus.`,
    hints: [
      "💡 Every form input needs an accessible name — that's what screen readers read aloud when the field is focused.",
      "🔍 There are 3 ways to name an input: <label for>, aria-labelledby, or aria-label. Placeholder doesn't count.",
    ]
  },
  {
    id: 4,
    category: "Live Regions",
    difficulty: 2,
    context: "A form validation message appears dynamically after submission. Sighted users see 'Error: Email is invalid' appear, but screen reader users miss it because focus doesn't move.",
    codeBefore: `<div \n  `,
    blank: `role="alert"`,
    codeAfter: `>\n  Error: Email is invalid\n</div>`,
    question: "What makes injected content automatically announced to screen reader users without moving focus?",
    options: [
      { value: `aria-live="off"`, label: "Disables live announcements", hint: "aria-live='off' is the default — it means nothing is announced automatically" },
      { value: `role="status"`, label: "Polite low-priority update", hint: "role='status' announces politely (waits for a pause) — good for non-urgent updates, but errors need priority" },
      { value: `role="alert"`, label: "Urgent assertive announcement", hint: "role='alert' has implied aria-live='assertive' — screen reader interrupts current speech immediately" },
      { value: `aria-atomic="true"`, label: "Announces the whole region", hint: "aria-atomic controls how much is read (whole region vs. just the change) — but doesn't trigger announcement by itself" },
    ],
    correctIndex: 2,
    explanation: `role="alert" is shorthand for aria-live="assertive" + aria-atomic="true". It interrupts whatever the screen reader is saying and announces the new content immediately.`,
    hints: [
      "💡 By default, dynamically injected content is completely silent to screen readers.",
      "🔍 Live regions tell the browser to watch for content changes and read them aloud — no focus movement needed.",
    ]
  },
  {
    id: 5,
    category: "Properties",
    difficulty: 2,
    context: "A modal dialog has a visible heading 'Confirm Deletion'. Screen readers should announce the dialog's name when it opens, associating it with that heading.",
    codeBefore: `<div \n  role="dialog"\n  `,
    blank: `aria-labelledby="dialog-title"`,
    codeAfter: `>\n  <h2 id="dialog-title">Confirm Deletion</h2>\n  ...\n</div>`,
    question: "How do you link the dialog to its visible heading so screen readers announce it as the dialog's name?",
    options: [
      { value: `aria-label="Confirm Deletion"`, label: "Names the dialog directly", hint: "aria-label works, but duplicates text that's already on screen — aria-labelledby is preferred when visible text exists" },
      { value: `aria-describedby="dialog-title"`, label: "Links it as a description", hint: "aria-describedby adds supplementary context — it's the description, not the name. Announced after the name." },
      { value: `aria-labelledby="dialog-title"`, label: "Points to visible heading text", hint: "aria-labelledby references an existing element's text as the accessible name" },
      { value: `aria-owns="dialog-title"`, label: "Claims ownership of child", hint: "aria-owns restructures the accessibility tree parent-child relationships — not for naming" },
    ],
    correctIndex: 2,
    explanation: `aria-labelledby points to another element's ID and uses that element's text content as the accessible name. This is preferred over aria-label when the name is already visible on screen.`,
    hints: [
      "💡 aria-labelledby and aria-describedby both reference IDs — but name vs. description are read at different times.",
      "🔍 The accessible name is announced first, then role, then description. So: 'Confirm Deletion [dialog]' then the description on pause.",
    ]
  },
  {
    id: 6,
    category: "States",
    difficulty: 2,
    context: "A toggle button switches between 'mute' and 'unmute' states. The icon changes visually but screen readers announce just the text 'Mute' regardless of state.",
    codeBefore: `<button \n  `,
    blank: `aria-pressed="true"`,
    codeAfter: `>\n  🔇 Mute\n</button>`,
    question: "What attribute signals that this button is currently in an active/on state?",
    options: [
      { value: `aria-checked="true"`, label: "Marks it as checked", hint: "aria-checked is for checkboxes, radio buttons, and switch roles — not generic toggle buttons" },
      { value: `aria-selected="true"`, label: "Marks it selected", hint: "aria-selected is for tabs, options in lists, and grid cells — not toggle buttons" },
      { value: `aria-pressed="true"`, label: "Marks it pressed/on", hint: "aria-pressed is specifically for toggle buttons — announces 'pressed' or 'not pressed'" },
      { value: `aria-current="true"`, label: "Marks current page/item", hint: "aria-current marks the active item in a set (nav links, steps, dates) — not a toggle state" },
    ],
    correctIndex: 2,
    explanation: `aria-pressed turns a <button> into a toggle button. When true, screen readers announce "Mute, pressed, button." When false, "Mute, not pressed, button." Always toggle this attribute via JavaScript.`,
    hints: [
      "💡 ARIA has different state attributes for different widget patterns — using the wrong one confuses users.",
      "🔍 Toggle buttons get aria-pressed. Checkboxes get aria-checked. Tabs get aria-selected. Navlinks get aria-current.",
    ]
  },
  {
    id: 7,
    category: "Hiding",
    difficulty: 1,
    context: "A decorative divider icon (✦) is placed between sections purely for visual effect. It adds noise to the accessibility tree.",
    codeBefore: `<span `,
    blank: `aria-hidden="true"`,
    codeAfter: `>✦</span>`,
    question: "How do you remove this decorative element from the accessibility tree?",
    options: [
      { value: `role="none"`, label: "Removes semantic role", hint: "role='none' (or 'presentation') removes the element's role, but content may still be read" },
      { value: `aria-hidden="true"`, label: "Hides from all AT", hint: "aria-hidden removes the element and all its children from the accessibility tree completely" },
      { value: `tabindex="-1"`, label: "Prevents keyboard focus", hint: "tabindex='-1' prevents tab focus but the element is still announced when navigating with a screen reader" },
      { value: `display: none`, label: "Hides it visually", hint: "display:none hides visually AND from AT — but that's CSS, and breaks layout intent. aria-hidden is more surgical." },
    ],
    correctIndex: 1,
    explanation: `aria-hidden="true" removes an element and all its children from the accessibility tree entirely. Screen readers skip it completely. Use it for decorative images, icon fonts, and visual separators.`,
    hints: [
      "💡 The accessibility tree is a parallel structure the browser builds for assistive tech — aria-hidden is a way to prune it.",
      "🔍 Rule of thumb: decorative images and icon-only flourishes should always have aria-hidden='true'.",
    ]
  },
  {
    id: 8,
    category: "Descriptions",
    difficulty: 3,
    context: "A password field has a 'Show/Hide' toggle. To help users, a description of the password requirements lives in a separate element with id='pw-rules'.",
    codeBefore: `<input\n  type="password"\n  aria-label="Password"\n  `,
    blank: `aria-describedby="pw-rules"`,
    codeAfter: `\n/>\n<p id="pw-rules">Min 8 chars, 1 number</p>`,
    question: "What links the input to the separate requirements text so it's read as supplementary description?",
    options: [
      { value: `aria-details="pw-rules"`, label: "Links extended description", hint: "aria-details links to complex reference content — appropriate for figures, code samples. For inline hints, use aria-describedby" },
      { value: `aria-labelledby="pw-rules"`, label: "Uses rules text as the name", hint: "This would replace 'Password' with the requirements text as the accessible name — confusing" },
      { value: `aria-controls="pw-rules"`, label: "Controls the rules element", hint: "aria-controls indicates the element controls another's content (like accordions) — not a description link" },
      { value: `aria-describedby="pw-rules"`, label: "Links supplementary hint text", hint: "aria-describedby connects a description: read after the name + role, usually after a short pause" },
    ],
    correctIndex: 3,
    explanation: `aria-describedby links supplementary description text. When the input is focused, screen readers first announce the accessible name ("Password") and role ("edit text"), then the description.`,
    hints: [
      "💡 Accessible name and description are separate concepts — name identifies, description explains.",
      "🔍 Multiple IDs work: aria-describedby='error-msg pw-rules' — both get read in order.",
    ]
  },
];

// Game state
let state = {
  questions: shuffle([...QUESTIONS]),
  currentIdx: 0,
  score: 0,
  streak: 0,
  attempts: 0,
  maxAttempts: 3,
  hintsShown: 0,
  selectedOption: null,
  revealed: false,
  correct: false,
  totalCorrect: 0,
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function render() {
  const app = document.getElementById('app');

  if (state.currentIdx >= state.questions.length) {
    renderEndScreen(app);
    return;
  }

  const q = state.questions[state.currentIdx];
  const progressPct = (state.currentIdx / state.questions.length) * 100;

  const diffDots = Array.from({length: 3}, (_, i) =>
    `<span class="difficulty-pip" style="background:${i < q.difficulty ? '#7c6af7' : '#2a2a3d'}"></span>`
  ).join('');

  const codeHtml = escHtml(q.codeBefore) +
    `<span class="code-blank">?</span>` +
    escHtml(q.codeAfter);

  const guessRows = [];
  const opts = q.options;

  // 2x2 grid
  for (let r = 0; r < 2; r++) {
    let cells = '';
    for (let c = 0; c < 2; c++) {
      const i = r * 2 + c;
      const opt = opts[i];
      let cls = 'guess-tile';
      if (state.revealed) {
        if (i === q.correctIndex) cls += ' correct';
        else if (state.selectedOption === i && i !== q.correctIndex) cls += ' incorrect';
      } else if (state.selectedOption === i) {
        cls += ' selected';
      }
      let ariaLabel = `Option ${i + 1}: ${opt.value}. ${opt.label}.`;
      if (state.revealed) {
        if (i === q.correctIndex) ariaLabel += ' Correct answer.';
        else if (state.selectedOption === i) ariaLabel += ' Incorrect.';
      }
      cells += `
        <button type="button" class="${cls}" onclick="selectOption(${i})" ${state.revealed ? 'disabled aria-disabled="true"' : ''} aria-label="${ariaLabel}">
          <code>${escHtml(opt.value)}</code>
          <div class="tile-label" aria-hidden="true">${opt.label}</div>
        </button>`;
    }
    guessRows.push(`<div class="guess-row">${cells}</div>`);
  }

  const hintHtml = state.hintsShown > 0 ? q.hints.slice(0, state.hintsShown).map(h =>
    `<div class="hint-pill"><span class="hint-icon">🔔</span><span>${h}</span></div>`
  ).join('') : '';

  const attemptsHtml = Array.from({length: state.maxAttempts}, (_, i) => {
    let cls = 'attempt-dot';
    let dotLabel = `Attempt ${i + 1}: unused`;
    if (state.revealed && state.correct && i === 0) { cls += ' used correct-dot'; dotLabel = `Attempt ${i + 1}: correct`; }
    else if (i < state.attempts) { cls += ' used'; dotLabel = `Attempt ${i + 1}: incorrect`; }
    return `<span class="${cls}" aria-label="${dotLabel}"></span>`;
  }).join('');

  const feedbackHtml = state.revealed ? renderFeedback(q) : '';

  app.innerHTML = `
    <!-- Top chrome: tiny progress + counter + attempts -->
    <div class="top-chrome">
      <div class="progress-track" role="progressbar" aria-valuenow="${state.currentIdx}" aria-valuemin="0" aria-valuemax="${state.questions.length}" aria-label="Quiz progress: challenge ${state.currentIdx + 1} of ${state.questions.length}">
        <div class="progress-fill" style="width:${progressPct}%"></div>
      </div>
      <div class="question-meta" aria-label="Challenge ${state.currentIdx + 1} of ${state.questions.length}, category: ${q.category}">
        <span>${state.currentIdx + 1}<span style="color:var(--border)">/</span>${state.questions.length}</span>
        <div class="attempts-dots" role="group" aria-label="Remaining attempts">${attemptsHtml}</div>
      </div>
    </div>

    <!-- TIER 1: Question — the hero, read first -->
    <div class="question-hero">
      <div class="question-eyebrow">
        <span class="category-badge">${q.category}</span>
      </div>
      <h2 class="question-text" id="question-text">${q.question}</h2>
    </div>

    <!-- TIER 2: Code evidence — secondary, compact -->
    <div class="evidence-section" aria-label="Code snippet">
      <div class="evidence-label" aria-hidden="true">Code snippet</div>
      <div class="scenario-card">
        <div class="scenario-header" aria-hidden="true">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="scenario-label">index.html ${diffDots}</span>
        </div>
        <pre class="code-block" tabindex="0" aria-label="HTML code snippet with a missing attribute shown as a question mark placeholder"><code>${syntaxHighlight(codeHtml)}</code></pre>
      </div>
      <details class="context-toggle">
        <summary>Scenario context</summary>
        <div class="context-body">${q.context}</div>
      </details>
    </div>

    <!-- TIER 3: Answer tiles -->
    <div class="answers-section">
      <div class="answers-label" aria-hidden="true">Choose the correct attribute</div>
      <div class="guess-grid" role="group" aria-labelledby="question-text">${guessRows.join('')}</div>
    </div>

    ${hintHtml ? `<div class="hints-area" aria-label="Hints" aria-live="polite" style="margin-top:4px">${hintHtml}</div>` : ''}

    ${feedbackHtml}
  `;

  document.getElementById('streak-val').textContent = state.streak;
}

function syntaxHighlight(html) {
  return html
    .replace(/(<\/?[\w-]+)/g, '<span class="code-tag">$1</span>')
    .replace(/([\w-]+=)(?!"[^"]*<)/g, '<span class="code-attr">$1</span>')
    .replace(/"([^<"]+)"/g, '"<span class="code-val">$1</span>"');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectOption(i) {
  if (state.revealed) return;
  state.selectedOption = i;
  const q = state.questions[state.currentIdx];

  if (i === q.correctIndex) {
    state.revealed = true;
    state.correct = true;
    const points = Math.max(10 - state.attempts * 3, 1);
    state.score += points;
    state.streak++;
    state.totalCorrect++;
  } else {
    state.attempts++;
    if (state.attempts < state.maxAttempts) {
      if (state.hintsShown < q.hints.length) state.hintsShown++;
      render();
      return;
    } else {
      state.revealed = true;
      state.correct = false;
      state.streak = 0;
    }
  }
  render();
  document.getElementById('streak-val').textContent = state.streak;
}

function renderFeedback(q) {
  if (state.correct) {
    const msgs = ["Nailed it!", "Correct!", "You got it!", "Spot on!", "That's right!"];
    const msg = msgs[state.currentIdx % msgs.length];
    return `
      <div class="feedback-box success" role="status" aria-live="assertive">
        <div class="feedback-emoji" aria-hidden="true">✅</div>
        <div class="feedback-title" aria-hidden="true">${msg}</div>
        <p class="feedback-explanation">${q.explanation}</p>
        <button class="next-btn" onclick="nextQuestion()">Next Challenge →</button>
      </div>
    `;
  } else {
    return `
      <div class="feedback-box fail" role="alert" aria-live="assertive">
        <div class="feedback-emoji" aria-hidden="true">💡</div>
        <div class="feedback-title" aria-hidden="true">Learning moment</div>
        <p class="feedback-explanation">${q.explanation}</p>
        <div class="answer-reveal">Correct answer: <code>${q.options[q.correctIndex].value}</code></div>
        <button class="next-btn" onclick="nextQuestion()">Next Challenge →</button>
      </div>
    `;
  }
}

function nextQuestion() {
  state.currentIdx++;
  state.attempts = 0;
  state.hintsShown = 0;
  state.selectedOption = null;
  state.revealed = false;
  state.correct = false;
  render();
}

function renderEndScreen(app) {
  const total = state.questions.length;
  const pct = Math.round((state.totalCorrect / total) * 100);
  let grade, emoji;
  if (pct >= 90) { grade = "ARIA Expert"; emoji = "🏆"; }
  else if (pct >= 70) { grade = "Good Grasp"; emoji = "🌟"; }
  else if (pct >= 50) { grade = "Keep Practicing"; emoji = "📚"; }
  else { grade = "Just Getting Started"; emoji = "🌱"; }

  app.innerHTML = `
    <div class="end-screen" role="status" aria-live="polite">
      <div style="font-size:56px;margin-bottom:12px" aria-hidden="true">${emoji}</div>
      <h2>${grade}</h2>
      <p>You answered <strong>${state.totalCorrect}/${total}</strong> correctly — <strong>${pct}%</strong></p>
      <button class="next-btn" style="margin-top:16px" onclick="restartGame()">Play Again 🔄</button>
    </div>
  `;
}

function restartGame() {
  state = {
    questions: shuffle([...QUESTIONS]),
    currentIdx: 0,
    score: 0,
    streak: 0,
    attempts: 0,
    maxAttempts: 3,
    hintsShown: 0,
    selectedOption: null,
    revealed: false,
    correct: false,
    totalCorrect: 0,
  };
  render();
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
